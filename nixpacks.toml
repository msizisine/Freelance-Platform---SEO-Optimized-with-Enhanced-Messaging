[phases.setup]
nixPkgs = ["postgresql", "libjpeg", "libpng", "zlib"]

[phases.install]
cmds = [
    "python -m pip install --upgrade pip setuptools wheel",
    "pip install -r requirements-railway.txt"
]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "sh -c 'python manage.py migrate && gunicorn --bind 0.0.0.0:$PORT freelance_platform.wsgi:application'"

[variables]
PYTHON_VERSION = "3.11"
PORT = "8000"
DJANGO_SETTINGS_MODULE = "freelance_platform.settings.production"
BUILD_VERSION = "2026-04-12-v3"
