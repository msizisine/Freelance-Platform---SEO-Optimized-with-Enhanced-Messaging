[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
PORT = "8000"
DJANGO_SETTINGS_MODULE = "freelance_platform.settings.production"

[[services.ports]]
port = 8000

[[services.tcp_checks]]
grace_period_seconds = 10
interval_seconds = 15
timeout_seconds = 5

[[services.http_checks]]
path = "/"
method = "GET"
protocol = "http"
grace_period_seconds = 10
interval_seconds = 15
timeout_seconds = 5

[[services]]
name = "db"

[services.variables]
POSTGRES_DB = "freelance_platform"
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "your-strong-password"

[[services]]
name = "redis"

[services.variables]
REDIS_URL = "redis://redis:6379"
