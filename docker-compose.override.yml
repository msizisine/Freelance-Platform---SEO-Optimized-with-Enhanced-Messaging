version: '3.8'

services:
  web:
    volumes:
      - .:/app  # Add volume mount for live updates
    environment:
      - DEBUG=True  # Enable debug for testing
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 1 --timeout 120 --reload freelance_platform.wsgi:application"
